# PiHole Helm Values
# Based on PiHole v2024.12.0

# PiHole configuration
pihole:
  image:
    repository: pihole/pihole
    tag: latest
    pullPolicy: IfNotPresent
  
  # Environment variables
  env:
    TZ: "Europe/Berlin"
    # Upstream DNS Server Cloudflare IPv4
    PIHOLE_DNS_: "1.1.1.1;1.0.0.1"
    # Respond only on interface eth0
    DNSMASQ_LISTENING: "single"
    # Conditional forwarding settings für Unifi Dream Machine
    CONDITIONAL_FORWARDING: "true"
    CONDITIONAL_FORWARDING_IP: "192.168.2.1"
    CONDITIONAL_FORWARDING_DOMAIN: "elmstreet79.de"
    CONDITIONAL_FORWARDING_REVERSE: "192.168.2.0/24"
    # Additional reverse DNS settings for multiple VLANs
    REV_SERVER: "true"
    REV_SERVER_DOMAIN: "elmstreet79.de"
    REV_SERVER_TARGET: "192.168.2.1"
    REV_SERVER_CIDR: "192.168.2.0/24,192.168.4.0/24,192.168.5.0/24"
    # Web interface settings
    WEBPASSWORD_FILE: "/etc/pihole/WEBPASSWORD"
  
  # Persistence for PiHole data
  persistence:
    enabled: true
    config:
      enabled: true
      size: 5Gi
      storageClass: "longhorn"  # Use Longhorn for HA storage
      accessMode: ReadWriteOnce
      mountPath: /etc/pihole
    dnsmasq:
      enabled: true
      size: 1Gi
      storageClass: "longhorn"  # Use Longhorn for HA storage
      accessMode: ReadWriteOnce
      mountPath: /etc/dnsmasq.d
  
  # DNS Service configuration (LoadBalancer)
  serviceDns:
    enabled: true
    type: LoadBalancer
    loadBalancerIP: "192.168.2.250"
    port: 53
    targetPort: 53
    protocol: UDP
    annotations:
      metallb.universe.tf/allow-shared-ip: pihole-svc
  
  # DNS TCP Service configuration
  serviceDnsTcp:
    enabled: true
    type: LoadBalancer
    loadBalancerIP: "192.168.2.250"
    port: 53
    targetPort: 53
    protocol: TCP
    annotations:
      metallb.universe.tf/allow-shared-ip: pihole-svc
  
  # Web Service configuration (for internal access)
  serviceWeb:
    enabled: true
    type: ClusterIP
    port: 80
    targetPort: 80
    protocol: TCP
  
  # Security context
  securityContext:
    runAsNonRoot: false
    runAsUser: 0
    runAsGroup: 0
    fsGroup: 0
    capabilities:
      add:
        - NET_ADMIN
        - NET_RAW
        - NET_BIND_SERVICE
  
  # Resource limits and requests
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  
  # Health checks
  livenessProbe:
    enabled: true
    httpGet:
      path: /admin/
      port: 80
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  
  readinessProbe:
    enabled: true
    httpGet:
      path: /admin/
      port: 80
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# Ingress configuration for Web Interface
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - host: pihole.${CF_DOMAIN}
      paths:
        - path: /
          pathType: Prefix
          service:
            name: pihole-web
            port: 80
  tls:
    - secretName: pihole-tls
      hosts:
        - pihole.${CF_DOMAIN}

# ServiceAccount
serviceAccount:
  create: true
  name: pihole-sa

# RBAC
rbac:
  create: true
