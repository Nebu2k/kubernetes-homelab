config:
  upstream:
    default:
      - tcp+udp://127.0.0.1:5353  # Unbound im selben Pod/Cluster
  blocking:
    blackLists:
      ads:
        - https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts
        - https://big.oisd.nl/domainswild
    clientGroupsBlock:
      default:
        - ads
    blockType: zeroIp
    loading:
      refreshPeriod: 6h

  port: 53
  httpPort: 4000
  logLevel: info
  logFormat: json

service:
  type: LoadBalancer
  loadBalancerIP: 192.168.2.250
  port: 53
  httpPort: 4000
  annotations:
    metallb.universe.tf/allow-shared-ip: blocky

persistence:
  enabled: false  # Konfig liegt ja in Helm/YAML

metrics:
  prometheus:
    enabled: true