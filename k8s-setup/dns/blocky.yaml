apiVersion: v1
kind: Namespace
metadata:
  name: dns
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: blocky-data
  namespace: dns
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: blocky-config
  namespace: dns
data:
  config.yml: |
    upstream:
      default:
        - 1.1.1.1
        - 8.8.8.8
    blocking:
      blackLists:
        ads:
          - https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts
      clientGroupsBlock:
        default:
          - ads
    port: 53
    httpPort: 4000
    prometheus:
      enable: true
    bootstrapDns:
      - 1.1.1.1
    caching:
      maxTime: 30m
    logLevel: info
    logFormat: json
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blocky
  namespace: dns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blocky
  template:
    metadata:
      labels:
        app: blocky
    spec:
      containers:
        - name: blocky
          image: spx01/blocky:latest
          args:
            - "--config=/app/config.yml"
          ports:
            - containerPort: 53
              name: dns-udp
              protocol: UDP
            - containerPort: 53
              name: dns-tcp
              protocol: TCP
            - containerPort: 4000
              name: metrics
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /app/config.yml
              subPath: config.yml
            - name: data
              mountPath: /app/data
      volumes:
        - name: config
          configMap:
            name: blocky-config
        - name: data
          persistentVolumeClaim:
            claimName: blocky-data
---
apiVersion: v1
kind: Service
metadata:
  name: blocky
  namespace: dns
spec:
  selector:
    app: blocky
  type: LoadBalancer
  loadBalancerIP: 192.168.2.250
  ports:
    - name: dns-udp
      port: 53
      protocol: UDP
      targetPort: dns-udp
    - name: dns-tcp
      port: 53
      protocol: TCP
      targetPort: dns-tcp
    - name: metrics
      port: 4000
      protocol: TCP
      targetPort: metrics