---
apiVersion: v1
kind: ConfigMap
metadata:
  name: blocky-config
  namespace: dns
data:
  config.yml: |
    upstream:
      default:
        - tcp+udp://127.0.0.1:5353  # Unbound im selben Pod/Cluster
    blocking:
      blackLists:
        ads:
          - https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts
          - https://big.oisd.nl/domainswild
      clientGroupsBlock:
        default:
          - ads
      blockType: zeroIp
      loading:
        refreshPeriod: 6h
    port: 53
    httpPort: 4000
    logLevel: info
    logFormat: json
    prometheus:
      enable: true
      path: /metrics

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: unbound-config
  namespace: dns
data:
  unbound.conf: |
    server:
      verbosity: 1
      interface: 0.0.0.0
      port: 5353
      do-ip4: yes
      do-udp: yes
      do-tcp: yes
      hide-identity: yes
      hide-version: yes
      use-caps-for-id: yes
      cache-max-ttl: 86400
      cache-min-ttl: 3600
      prefetch: yes
      qname-minimisation: yes
      harden-glue: yes
      harden-dnssec-stripped: yes
      do-not-query-localhost: no
      unwanted-reply-threshold: 10000000
      rrset-roundrobin: yes
      minimal-responses: yes
    forward-zone:
      name: "."
      forward-tls-upstream: yes
      forward-addr: 1.1.1.1@853
      forward-addr: 9.9.9.9@853
      forward-addr: 2606:4700:4700::1111@853

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blocky
  namespace: dns
  labels:
    app.kubernetes.io/name: blocky
    app.kubernetes.io/instance: blocky
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: blocky
      app.kubernetes.io/instance: blocky
  template:
    metadata:
      labels:
        app.kubernetes.io/name: blocky
        app.kubernetes.io/instance: blocky
    spec:
      containers:
      - name: blocky
        image: spx01/blocky:latest
        ports:
        - containerPort: 53
          name: dns-tcp
          protocol: TCP
        - containerPort: 53
          name: dns-udp
          protocol: UDP
        - containerPort: 4000
          name: http
          protocol: TCP
        volumeMounts:
        - name: config
          mountPath: /app/config.yml
          subPath: config.yml
        livenessProbe:
          httpGet:
            path: /
            port: 4000
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 4000
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
      - name: unbound
        image: mvance/unbound:latest
        ports:
        - containerPort: 5353
          name: dns
          protocol: UDP
        - containerPort: 5353
          name: dns-tcp
          protocol: TCP
        volumeMounts:
        - name: unbound-config
          mountPath: /opt/unbound/etc/unbound/unbound.conf
          subPath: unbound.conf
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
      volumes:
      - name: config
        configMap:
          name: blocky-config
      - name: unbound-config
        configMap:
          name: unbound-config

---
apiVersion: v1
kind: Service
metadata:
  name: blocky
  namespace: dns
  annotations:
    metallb.universe.tf/allow-shared-ip: blocky
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.2.250
  ports:
  - port: 53
    targetPort: 53
    protocol: UDP
    name: dns-udp
  - port: 53
    targetPort: 53
    protocol: TCP
    name: dns-tcp
  - port: 4000
    targetPort: 4000
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/name: blocky
    app.kubernetes.io/instance: blocky

---
apiVersion: v1
kind: Service
metadata:
  name: blocky-metrics
  namespace: dns
  labels:
    app.kubernetes.io/name: blocky
    app.kubernetes.io/component: metrics
spec:
  type: ClusterIP
  ports:
  - port: 4000
    targetPort: 4000
    protocol: TCP
    name: metrics
  selector:
    app.kubernetes.io/name: blocky
    app.kubernetes.io/instance: blocky

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: blocky-metrics
  namespace: dns
  labels:
    app.kubernetes.io/name: blocky
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: blocky
      app.kubernetes.io/component: metrics
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s