apiVersion: v1
kind: ConfigMap
metadata:
  name: unbound-config
  namespace: dns
data:
  unbound.conf: |
    server:
      verbosity: 1
      interface: 0.0.0.0
      port: 5353
      do-ip4: yes
      do-udp: yes
      do-tcp: yes
      hide-identity: yes
      hide-version: yes
      use-caps-for-id: yes
      cache-max-ttl: 86400
      cache-min-ttl: 3600
      prefetch: yes
      qname-minimisation: yes
      harden-glue: yes
      harden-dnssec-stripped: yes
      do-not-query-localhost: no
      unwanted-reply-threshold: 10000000
      rrset-roundrobin: yes
      minimal-responses: yes
    forward-zone:
      name: "."
      forward-tls-upstream: yes
      forward-addr: 1.1.1.1@853
      forward-addr: 9.9.9.9@853
      forward-addr: 2606:4700:4700::1111@853
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unbound
  namespace: dns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unbound
  template:
    metadata:
      labels:
        app: unbound
    spec:
      containers:
        - name: unbound
          image: mvance/unbound:latest
          ports:
            - containerPort: 5353
          volumeMounts:
            - name: config
              mountPath: /opt/unbound/etc/unbound/unbound.conf
              subPath: unbound.conf
      volumes:
        - name: config
          configMap:
            name: unbound-config