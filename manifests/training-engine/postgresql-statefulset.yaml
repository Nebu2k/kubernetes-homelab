apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: training-engine-postgresql
  namespace: training-engine
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/component: primary
spec:
  serviceName: training-engine-postgresql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql
      app.kubernetes.io/component: primary
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgresql
        app.kubernetes.io/component: primary
    spec:
      nodeSelector:
        node-role.kubernetes.io/worker: "worker"
      containers:
        - name: postgresql
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: tcp-postgresql
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: training_engine
            - name: POSTGRES_DB
              value: training_engine
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: training-engine-secrets
                  key: db-password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: training-engine-postgresql-data
