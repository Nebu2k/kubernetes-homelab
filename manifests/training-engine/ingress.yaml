apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: training-engine
  namespace: training-engine
  annotations:
    pangolin.io/expose: "true"
    pangolin.io/auth: "true"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Training Engine"
    gethomepage.dev/description: "Training Plan Generator"
    gethomepage.dev/group: "Applications"
    gethomepage.dev/icon: "dumbbell"
    gethomepage.dev/weight: "50"
spec:
  ingressClassName: traefik
  rules:
    - host: training.elmstreet79.de
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: training-engine-api
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: training-engine-frontend
                port:
                  number: 80
