---
# Ingress-only default-deny: nichts von außerhalb des Namespace erreicht die Pods,
# außer den unten explizit erlaubten Pfaden. Egress bleibt offen (S3-Backup, SMB, DNS).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: paperless-ngx
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Intra-Namespace frei: paperless <-> postgresql <-> redis (gleiche Trust-Domain).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: paperless-ngx
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
---
# Traefik (ns traefik) darf die Web-UI auf 8000 erreichen.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik-ingress
  namespace: paperless-ngx
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: paperless-ngx
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: 8000
