---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: teslamate-postgres-exporter
  namespace: teslamate
  labels:
    app: teslamate-postgres-exporter
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: teslamate-postgres-exporter
  endpoints:
    - port: metrics
      interval: 60s
      scrapeTimeout: 30s
