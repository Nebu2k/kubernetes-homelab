apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant
  namespace: home-assistant
  labels:
    app.kubernetes.io/name: home-assistant
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: home-assistant
  template:
    metadata:
      annotations:
        reloader.stakater.com/auto: "true"
      labels:
        app.kubernetes.io/name: home-assistant
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - prodesk
      nodeSelector:
        node-role.kubernetes.io/worker: "worker"
      initContainers:
      - name: copy-config
        image: busybox:1.36.1
        command: ['sh', '-c', 'cp -f /tmp/config/configuration.yaml /config/configuration.yaml']
        volumeMounts:
        - name: config
          mountPath: /config
        - name: config-cm
          mountPath: /tmp/config
      - name: install-hacs
        image: ghcr.io/home-assistant/home-assistant:2026.3.3
        env:
        - name: HACS_VERSION
          value: "2.0.5"
        - name: HACS_SHA256
          value: "97be6b824a4f38e683728cc6dd72367f6b8bad0a43428b1b3b987a3087adf413"
        command:
        - /bin/bash
        - -c
        - |
          set -euo pipefail
          if [ -d "/config/custom_components/hacs" ]; then
            echo "HACS already installed, skipping"
            exit 0
          fi
          echo "Installing pinned HACS ${HACS_VERSION}..."
          python3 -c "import os,urllib.request; open('/tmp/hacs.zip','wb').write(urllib.request.urlopen('https://github.com/hacs/integration/releases/download/'+os.environ['HACS_VERSION']+'/hacs.zip', timeout=60).read())"
          python3 -c "import hashlib,sys; d=open('/tmp/hacs.zip','rb').read(); sys.exit(0 if hashlib.sha256(d).hexdigest()=='${HACS_SHA256}' else 'HACS checksum mismatch')"
          mkdir -p /config/custom_components/hacs
          python3 -c "import zipfile; zipfile.ZipFile('/tmp/hacs.zip').extractall('/config/custom_components/hacs')"
          rm -f /tmp/hacs.zip
          echo "HACS ${HACS_VERSION} installed and verified"
        volumeMounts:
        - name: config
          mountPath: /config
      containers:
      - name: home-assistant
        image: ghcr.io/home-assistant/home-assistant:2026.3.3
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            add:
              - NET_ADMIN
              - NET_RAW
        ports:
        - name: http
          containerPort: 8123
          protocol: TCP
        env:
        - name: TZ
          value: "Europe/Berlin"
        volumeMounts:
        - name: config
          mountPath: /config
        - name: dbus
          mountPath: /run/dbus
          readOnly: true
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            memory: "896Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
      - name: matter-server
        image: ghcr.io/home-assistant-libs/python-matter-server:8.1.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: matter
          containerPort: 5580
          protocol: TCP
        env:
        - name: TZ
          value: "Europe/Berlin"
        volumeMounts:
        - name: matter-data
          mountPath: /data
        command:
        - python
        - -m
        - matter_server.server
        - --storage-path
        - /data
        - --port
        - "5580"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: home-assistant-config
      - name: config-cm
        configMap:
          name: home-assistant-config-cm
          items:
            - key: configuration.yaml
              path: configuration.yaml
      - name: matter-data
        persistentVolumeClaim:
          claimName: home-assistant-matter-data
      - name: dbus
        hostPath:
          path: /run/dbus
          type: Directory
