# Traefik routing for external services with self-signed HTTPS backends.
# Uses the shared insecure-transport ServersTransport (see servers-transport.yaml).
# DNS sync discovery happens via the Service carriers (homelab.io/expose + host).
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: dreambox
  namespace: external-services
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`dreambox.elmstreet79.de`)
      kind: Rule
      services:
        - name: dreambox-external
          port: 443
          scheme: https
          serversTransport: insecure-transport
