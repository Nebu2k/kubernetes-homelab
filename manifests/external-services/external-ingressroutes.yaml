---
# Traefik ServersTransport for external backends that present their own
# self-signed certificates (proxmox, unifi, nas, dreambox). Lives in this
# namespace because Traefik runs with allowCrossNamespace: false.
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: insecure-transport
  namespace: external-services
spec:
  insecureSkipVerify: true
---
# HTTPS backends (self-signed → insecure-transport)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: dreambox
  namespace: external-services
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`dreambox.elmstreet79.de`)
      kind: Rule
      services:
        - name: dreambox-external
          port: 443
          scheme: https
          serversTransport: insecure-transport
  tls: {}
---
apiVersion: traefik.io/v1alpha1
