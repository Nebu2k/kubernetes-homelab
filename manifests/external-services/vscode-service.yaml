---
apiVersion: v1
kind: Service
metadata:
  name: vscode
  namespace: external-services
  annotations:
    homelab.io/expose: "internal"
    homelab.io/host: "vscode.elmstreet79.de"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: vscode
  namespace: external-services
subsets:
  - addresses:
      - ip: 192.168.2.4
    ports:
      - name: http
        port: 8080
        protocol: TCP
