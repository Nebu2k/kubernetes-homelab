---
apiVersion: v1
kind: Service
metadata:
  name: minio-api-external
  namespace: external-services
  annotations:
    homelab.io/expose: "internal"
    homelab.io/host: "minio-api.elmstreet79.de"

spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: api
      port: 9000
      targetPort: 9000
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: minio-api-external
  namespace: external-services
subsets:
  - addresses:
      - ip: 192.168.2.15
    ports:
      - name: api
        port: 9000
        protocol: TCP
