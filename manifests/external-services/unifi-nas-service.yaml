---
apiVersion: v1
kind: Service
metadata:
  name: unifi-nas
  namespace: external-services
  annotations:
    homelab.io/expose: "internal"
    homelab.io/host: "nas.elmstreet79.de"

spec:
  type: ClusterIP
  ports:
    - name: https
      port: 443
      targetPort: 443
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: unifi-nas
  namespace: external-services
subsets:
  - addresses:
      - ip: 192.168.2.6
    ports:
      - name: https
        port: 443
        protocol: TCP
