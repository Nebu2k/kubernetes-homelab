---
apiVersion: v1
kind: Service
metadata:
  name: proxmox
  namespace: external-services
  annotations:
    homelab.io/expose: "internal"
    homelab.io/host: "pve.elmstreet79.de"

spec:
  type: ClusterIP
  ports:
    - name: https
      port: 443
      targetPort: 8006
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: proxmox
  namespace: external-services
subsets:
  - addresses:
      - ip: 192.168.2.8
    ports:
      - name: https
        port: 8006
        protocol: TCP
