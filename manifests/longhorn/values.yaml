# Longhorn distributed storage values
persistence:
  defaultClass: true
  defaultClassReplicaCount: 2
  defaultNodeSelector:
    enable: true
    selector: "storage"
  recurringJobSelector:
    enable: true
    jobList: '[{"name":"backup","isGroup":true},{"name":"snapshot","isGroup":true},{"name":"maintenance","isGroup":true}]'

# Default backup store configuration (MinIO on Proxmox VM)
defaultBackupStore:
    backupTarget: "s3://homelab-longhorn@us-east-1/"
    backupTargetCredentialSecret: longhorn-minio-secret
# Default settings
defaultSettings:
  defaultReplicaCount: "2"
  # RWX (ReadWriteMany) Support via NFS
  rwxVolumeFastFailover: "true"
  # Automatic replica rebalancing across nodes
  replicaAutoBalance: "best-effort"
  # Limit concurrent replica rebuilds per node to prevent overload (especially on Raspberry Pis)
  concurrentReplicaRebuildPerNodeLimit: "2"
  # Reduce backup concurrency to prevent overwhelming ARM nodes during nightly backups
  backupConcurrentLimit: "1"  # Default is 2, reduce to 1 to prevent raspi5 overload
  concurrentVolumeBackupRestorePerNodeLimit: "2"  # Default is 5, reduce to 2
  # Always allow node drain - prevents kured from getting stuck on
  # PodDisruptionBudgets of instance-manager pods during automated reboots.
  # "allow-if-replica-is-stopped" only handles replicas, not engines of attached
  # volumes. "always-allow" force-detaches volumes so drains always complete.
  nodeDrainPolicy: "always-allow"
  # Reclaim space from removed snapshots during filesystem-trim.
  # Without this, the weekly trim only releases free filesystem blocks but leaves
  # marked-removed snapshots on disk — high-churn volumes (Prometheus) bloat to
  # 10x their nominal size.
  removeSnapshotsDuringFilesystemTrim: "true"

# Disable preUpgrade hook (causes issues with ArgoCD)
preUpgradeChecker:
  jobEnabled: false
